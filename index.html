<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>r99 - Chat P2P WebRTC</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- PeerJS CDN -->
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>

    <style>
        :root {
            /* User specified palette */
            --bg-matte: #0D0D0D;           /* Preto fosco */
            --container-charcoal: #1A1A1A; /* Carvão profundo */
            --border-lead: #2B2B2B;        /* Cinza chumbo */
            --accent-gold: #C9A84C;        /* Dourado opaco */
            --accent-wine: #6B1D2F;        /* Vinho tinto */
            --text-smoke: #8C8C8C;         /* Fumaça de charuto */
            --text-ivory: #D4C5A9;         /* Marfim envelhecido */
            --danger-blood: #4A0F1A;       /* Vermelho sangue seco */

            /* Semantic UI mapping */
            --glass-bg: var(--container-charcoal);
            --glass-border: var(--border-lead);
            --glass-focus-border: var(--accent-gold);
            
            --text-primary: var(--text-ivory);
            --text-secondary: var(--text-smoke);
            
            --bubble-sent: linear-gradient(135deg, var(--accent-wine) 0%, var(--danger-blood) 100%);
            --bubble-received: var(--border-lead);
            
            --success: var(--accent-gold);
            --warning: var(--accent-gold);
            --danger: var(--danger-blood);
            
            --transition-speed: 0.3s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg-matte);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 16px;
        }

        /* Container & Glassmorphism */
        .app-container {
            width: 100%;
            max-width: 480px;
            height: 90vh;
            max-height: 750px;
            background: var(--container-charcoal);
            border: 1px solid var(--border-lead);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            transition: all var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Screen Transitions */
        .screen {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
            transition: opacity var(--transition-speed) ease, transform var(--transition-speed) ease;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
            position: relative;
        }

        /* Logo / Header on Setup */
        .setup-header {
            text-align: center;
            padding: 40px 24px 20px;
        }

        .logo-icon {
            font-size: 3rem;
            color: var(--accent-gold);
            margin-bottom: 12px;
            filter: drop-shadow(0 0 12px rgba(201, 168, 76, 0.25));
        }

        .setup-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            color: var(--text-primary);
        }

        .setup-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Forms */
        .setup-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
            justify-content: flex-start;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: var(--text-secondary);
            font-size: 1.1rem;
            transition: color var(--transition-speed);
        }

        .input-field {
            width: 100%;
            background: var(--bg-matte);
            border: 1px solid var(--border-lead);
            border-radius: 14px;
            padding: 14px 16px 14px 46px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: border-color var(--transition-speed), box-shadow var(--transition-speed);
        }

        .input-field:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 15px rgba(201, 168, 76, 0.15);
        }

        .input-field:focus + i {
            color: var(--accent-gold);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 10px 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-lead);
        }

        .divider:not(:empty)::before {
            margin-right: .5em;
        }

        .divider:not(:empty)::after {
            margin-left: .5em;
        }

        /* Buttons */
        .btn {
            background: var(--border-lead);
            border: 1px solid var(--border-lead);
            color: var(--text-primary);
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: all var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .btn:hover {
            background: rgba(43, 43, 43, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            color: var(--bg-matte);
            box-shadow: 0 4px 15px rgba(201, 168, 76, 0.2);
        }

        .btn-primary:hover {
            background: #d5b862;
            border-color: #d5b862;
            color: var(--bg-matte);
            box-shadow: 0 6px 20px rgba(201, 168, 76, 0.35);
        }

        .btn-success {
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            box-shadow: none;
        }

        .btn-success:hover {
            background: rgba(201, 168, 76, 0.08);
            color: #d5b862;
            border-color: #d5b862;
            box-shadow: 0 6px 20px rgba(201, 168, 76, 0.1);
        }

        /* Loader Overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 13, 13, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-speed) ease;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border-lead);
            border-left-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Chat Screen Header */
        .chat-header {
            padding: 16px 20px;
            background: rgba(13, 13, 13, 0.5);
            border-bottom: 1px solid var(--border-lead);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .peer-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 60%;
        }

        .peer-name {
            font-size: 1.1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-gold);
            position: relative;
        }

        .status-dot.connected {
            background-color: var(--accent-gold);
            box-shadow: 0 0 8px var(--accent-gold);
        }

        .status-dot.disconnected {
            background-color: var(--danger-blood);
            box-shadow: 0 0 8px var(--danger-blood);
        }

        .status-dot.connecting {
            background-color: var(--accent-gold);
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: var(--border-lead);
            border: 1px solid var(--border-lead);
            color: var(--text-primary);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all var(--transition-speed);
        }

        .icon-btn:hover {
            background: var(--container-charcoal);
            border-color: var(--accent-gold);
            transform: scale(1.05);
        }

        /* Room ID Badge & Actions */
        .room-badge-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(13, 13, 13, 0.2);
            border-bottom: 1px solid var(--border-lead);
            font-size: 0.85rem;
        }

        .room-id-label {
            color: var(--text-secondary);
        }

        .room-id-value {
            font-family: monospace;
            background: var(--danger-blood);
            padding: 4px 8px;
            border-radius: 6px;
            color: var(--text-primary);
            font-weight: bold;
            letter-spacing: 0.5px;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .copy-badge-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            transition: color var(--transition-speed);
        }

        .copy-badge-btn:hover {
            color: var(--text-primary);
        }

        /* Message Area */
        .message-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar for Message Area */
        .message-area::-webkit-scrollbar {
            width: 6px;
        }

        .message-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .message-area::-webkit-scrollbar-thumb {
            background: var(--border-lead);
            border-radius: 3px;
        }

        .message-area::-webkit-scrollbar-thumb:hover {
            background: var(--text-smoke);
        }

        /* Message Bubbles */
        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.sent {
            justify-content: flex-end;
        }

        .message-row.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 75%;
            padding: 10px 14px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sent .message-bubble {
            background: var(--bubble-sent);
            color: var(--text-primary);
            border-radius: 16px 16px 4px 16px;
            transform-origin: bottom right;
            animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .received .message-bubble {
            background: var(--bubble-received);
            color: var(--text-primary);
            border: 1px solid var(--border-lead);
            border-radius: 16px 16px 16px 4px;
            transform-origin: bottom left;
            animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .message-sender {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.85;
        }

        .sent .message-sender {
            color: var(--accent-gold);
        }

        .received .message-sender {
            color: var(--accent-gold);
        }

        .message-text {
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .message-time {
            font-size: 0.65rem;
            align-self: flex-end;
            opacity: 0.6;
            margin-top: 2px;
        }

        /* Notification message */
        .message-notification {
            align-self: center;
            background: var(--danger-blood);
            border: 1px solid var(--border-lead);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.75rem;
            color: var(--text-primary);
            text-align: center;
            animation: fadeIn 0.3s ease;
            max-width: 90%;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Chat Input Panel */
        .chat-input-panel {
            padding: 16px 20px 20px;
            background: rgba(13, 13, 13, 0.5);
            border-top: 1px solid var(--border-lead);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input-wrapper {
            flex: 1;
            position: relative;
        }

        .chat-input {
            width: 100%;
            background: var(--bg-matte);
            border: 1px solid var(--border-lead);
            border-radius: 24px;
            padding: 12px 18px;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: all var(--transition-speed);
        }

        .chat-input:focus {
            border-color: var(--accent-gold);
            background: var(--container-charcoal);
            box-shadow: 0 0 15px rgba(201, 168, 76, 0.05);
        }

        .send-btn {
            background: var(--accent-gold);
            border: none;
            color: var(--bg-matte);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all var(--transition-speed);
            box-shadow: 0 4px 10px rgba(201, 168, 76, 0.2);
        }

        .send-btn:hover {
            transform: scale(1.08) rotate(-15deg);
            background: #d5b862;
            box-shadow: 0 6px 15px rgba(201, 168, 76, 0.3);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Error/Warning Banner */
        .alert-banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--accent-wine);
            color: var(--text-primary);
            padding: 10px 16px;
            font-size: 0.85rem;
            text-align: center;
            z-index: 50;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 12px rgba(107, 29, 47, 0.3);
            transform: translateY(-100%);
            transition: transform var(--transition-speed) ease;
        }

        .alert-banner.active {
            transform: translateY(0);
        }

        .alert-btn {
            background: var(--bg-matte);
            border: 1px solid var(--border-lead);
            color: var(--accent-gold);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition-speed);
        }

        .alert-btn:hover {
            background: var(--border-lead);
            color: #d5b862;
        }

        /* Responsive Breakpoints */
        @media (max-width: 480px) {
            body {
                padding: 0;
            }
            .app-container {
                height: 100vh;
                max-height: none;
                border-radius: 0;
                border: none;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- Alert Warning Banner -->
        <div id="alertBanner" class="alert-banner">
            <span id="alertMsg"><i class="fa-solid fa-triangle-exclamation"></i> Conexão perdida!</span>
            <button id="reconnectBtn" class="alert-btn">Reconectar</button>
        </div>

        <!-- Spinner Loading Page -->
        <div id="loadingOverlay" class="loading-overlay">
            <div class="spinner"></div>
            <p id="loadingMsg" style="font-weight: 500; font-size: 0.95rem; color: var(--text-secondary);">Estabelecendo conexão...</p>
        </div>

        <!-- 1. SCREEN: Setup / Entry -->
        <div id="setupScreen" class="screen active">
            <div class="setup-header">
                <div class="logo-icon"><i class="fa-solid fa-comments-dollar"></i></div>
                <h1>r99</h1>
                <p>Chat P2P seguro & ultra rápido via WebRTC</p>
            </div>
            
            <div class="setup-body">
                <div class="input-group">
                    <label for="usernameInput">Seu Nome / Apelido</label>
                    <div class="input-wrapper">
                        <input type="text" id="usernameInput" class="input-field" placeholder="Ex: Alice" maxlength="15">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>

                <button id="createRoomBtn" class="btn btn-primary" style="margin-top: 10px;">
                    <i class="fa-solid fa-plus-circle"></i> Criar Nova Sala
                </button>

                <div class="divider">ou entre em uma existente</div>

                <div class="input-group">
                    <label for="roomIdInput">ID da Sala do Parceiro</label>
                    <div class="input-wrapper">
                        <input type="text" id="roomIdInput" class="input-field" placeholder="Cole o ID recebido aqui...">
                        <i class="fa-solid fa-key"></i>
                    </div>
                </div>

                <button id="joinRoomBtn" class="btn btn-success">
                    <i class="fa-solid fa-sign-in-alt"></i> Entrar na Sala
                </button>
            </div>
        </div>

        <!-- 2. SCREEN: Chat Panel -->
        <div id="chatScreen" class="screen">
            <div class="chat-header">
                <div class="peer-info">
                    <div id="peerNameDisplay" class="peer-name">Parceiro</div>
                    <div class="connection-status">
                        <div id="statusDot" class="status-dot connecting"></div>
                        <span id="statusText">Conectando...</span>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="leaveChatBtn" class="icon-btn" title="Sair do Chat">
                        <i class="fa-solid fa-right-from-bracket" style="color: var(--danger);"></i>
                    </button>
                </div>
            </div>

            <!-- Room Info & Copy Block -->
            <div class="room-badge-container">
                <span class="room-id-label">ID da sua sala:</span>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <div id="myRoomIdDisplay" class="room-id-value">Gerando...</div>
                    <button id="copyIdBtn" class="copy-badge-btn" title="Copiar ID">
                        <i class="fa-solid fa-copy"></i>
                    </button>
                </div>
            </div>

            <!-- Chat messages feed -->
            <div id="messageArea" class="message-area">
                <!-- Message structures will be rendered here dynamically -->
            </div>

            <!-- Chat message typing area -->
            <div class="chat-input-panel">
                <div class="chat-input-wrapper">
                    <input type="text" id="messageInput" class="chat-input" placeholder="Digite uma mensagem..." autocomplete="off">
                </div>
                <button id="sendMessageBtn" class="send-btn" title="Enviar Mensagem">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>

    </div>

    <script>
        // DOM Elements
        const setupScreen = document.getElementById('setupScreen');
        const chatScreen = document.getElementById('chatScreen');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingMsg = document.getElementById('loadingMsg');
        
        const usernameInput = document.getElementById('usernameInput');
        const roomIdInput = document.getElementById('roomIdInput');
        const createRoomBtn = document.getElementById('createRoomBtn');
        const joinRoomBtn = document.getElementById('joinRoomBtn');
        
        const peerNameDisplay = document.getElementById('peerNameDisplay');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const myRoomIdDisplay = document.getElementById('myRoomIdDisplay');
        const copyIdBtn = document.getElementById('copyIdBtn');
        const leaveChatBtn = document.getElementById('leaveChatBtn');
        
        const messageArea = document.getElementById('messageArea');
        const messageInput = document.getElementById('messageInput');
        const sendMessageBtn = document.getElementById('sendMessageBtn');
        
        const alertBanner = document.getElementById('alertBanner');
        const alertMsg = document.getElementById('alertMsg');
        const reconnectBtn = document.getElementById('reconnectBtn');

        // State Variables
        let peerInstance = null;
        let activeConn = null;
        let myUsername = 'Usuário';
        let peerUsername = 'Parceiro';
        let isHost = false;
        let hostRoomId = null;

        // Auto-scroll configuration
        function scrollToBottom() {
            messageArea.scrollTop = messageArea.scrollHeight;
        }

        // Show/Hide loader
        function setLoader(show, text = 'Processando...') {
            loadingMsg.textContent = text;
            if (show) {
                loadingOverlay.classList.add('active');
            } else {
                loadingOverlay.classList.remove('active');
            }
        }

        // Show error/alert banner
        function showAlert(msg, showReconnect = false) {
            alertMsg.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ${msg}`;
            reconnectBtn.style.display = showReconnect ? 'inline-block' : 'none';
            alertBanner.classList.add('active');
        }

        function hideAlert() {
            alertBanner.classList.remove('active');
        }

        // Add visual message bubble
        function appendMessage(sender, text, type) {
            // type: 'sent', 'received', 'notification'
            const timeString = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            if (type === 'notification') {
                const noteElement = document.createElement('div');
                noteElement.className = 'message-notification';
                noteElement.innerHTML = text;
                messageArea.appendChild(noteElement);
            } else {
                const row = document.createElement('div');
                row.className = `message-row ${type}`;
                
                row.innerHTML = `
                    <div class="message-bubble">
                        <span class="message-sender">${sender}</span>
                        <p class="message-text">${escapeHTML(text)}</p>
                        <span class="message-time">${timeString}</span>
                    </div>
                `;
                messageArea.appendChild(row);
            }
            
            scrollToBottom();
        }

        // Prevent XSS
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        // Copy Room ID to Clipboard
        copyIdBtn.addEventListener('click', async () => {
            const idText = myRoomIdDisplay.textContent;
            if (idText && idText !== 'Gerando...') {
                try {
                    await navigator.clipboard.writeText(idText);
                    const originalIcon = copyIdBtn.innerHTML;
                    copyIdBtn.innerHTML = '<i class="fa-solid fa-check" style="color: var(--success);"></i>';
                    setTimeout(() => {
                        copyIdBtn.innerHTML = originalIcon;
                    }, 2000);
                } catch (err) {
                    console.error('Falha ao copiar:', err);
                }
            }
        });

        // Initialize PeerJS client
        function initPeer(onOpenCallback) {
            // Clear existing Peer instance if any
            destroyPeer();
            
            setLoader(true, 'Conectando ao servidor de sinalização...');
            
            peerInstance = new Peer(undefined, {
                host: '0.peerjs.com',
                port: 443,
                secure: true,
                debug: 1 // Only show errors in console
            });

            peerInstance.on('open', (id) => {
                setLoader(false);
                hideAlert();
                myRoomIdDisplay.textContent = id;
                if (onOpenCallback) onOpenCallback(id);
            });

            peerInstance.on('connection', (conn) => {
                // When we receive an incoming connection (Host side)
                if (activeConn) {
                    // Refuse multiple connections - 1-on-1 only
                    conn.on('open', () => {
                        conn.send({ type: 'system', action: 'busy' });
                        setTimeout(() => conn.close(), 1000);
                    });
                    return;
                }
                
                handleConnection(conn);
            });

            peerInstance.on('error', (err) => {
                setLoader(false);
                console.error('Erro PeerJS:', err);
                
                if (err.type === 'peer-unavailable') {
                    showAlert('A sala de destino não existe ou está inacessível.', false);
                    leaveChat();
                } else if (err.type === 'network') {
                    showAlert('Falha na rede ao conectar ao servidor.', true);
                } else {
                    showAlert(`Erro: ${err.message || 'Desconhecido'}`, true);
                }
            });

            peerInstance.on('disconnected', () => {
                statusDot.className = 'status-dot disconnected';
                statusText.textContent = 'Desconectado do servidor';
                showAlert('Desconectado do servidor de sinalização.', true);
            });
        }

        // Clean up connections
        function destroyPeer() {
            if (activeConn) {
                activeConn.close();
                activeConn = null;
            }
            if (peerInstance) {
                peerInstance.destroy();
                peerInstance = null;
            }
        }

        // Handle connection events
        function handleConnection(conn) {
            activeConn = conn;
            
            // UI adjustments
            setupScreen.classList.remove('active');
            chatScreen.classList.add('active');
            
            statusDot.className = 'status-dot connecting';
            statusText.textContent = 'Conectando ao parceiro...';
            
            conn.on('open', () => {
                statusDot.className = 'status-dot connected';
                statusText.textContent = 'Conectado';
                hideAlert();
                
                // Host receives metadata, Joiner sends handshake
                if (isHost) {
                    peerUsername = conn.metadata?.username || 'Parceiro';
                    peerNameDisplay.textContent = peerUsername;
                    appendMessage(null, `<b>${peerUsername}</b> entrou na sala!`, 'notification');
                    
                    // Reply to Joiner with Host's nickname
                    conn.send({ type: 'handshake', username: myUsername });
                }
            });

            conn.on('data', (data) => {
                if (data.type === 'handshake') {
                    peerUsername = data.username || 'Parceiro';
                    peerNameDisplay.textContent = peerUsername;
                    appendMessage(null, `<b>${peerUsername}</b> entrou na sala!`, 'notification');
                } else if (data.type === 'message') {
                    appendMessage(peerUsername, data.text, 'received');
                } else if (data.type === 'system' && data.action === 'busy') {
                    showAlert('A sala está cheia. Limite de 1-para-1 atingido.', false);
                    leaveChat();
                }
            });

            conn.on('close', () => {
                appendMessage(null, `<b>${peerUsername}</b> saiu da sala.`, 'notification');
                statusDot.className = 'status-dot disconnected';
                statusText.textContent = 'Parceiro desconectado';
                activeConn = null;
            });

            conn.on('error', (err) => {
                console.error('Erro na conexão:', err);
                showAlert('Erro na conexão P2P com o parceiro.');
            });
        }

        // Action: Create Room
        createRoomBtn.addEventListener('click', () => {
            const name = usernameInput.value.trim();
            if (!name) {
                alert('Por favor, digite seu nome/apelido primeiro.');
                usernameInput.focus();
                return;
            }
            myUsername = name;
            isHost = true;

            initPeer((id) => {
                setupScreen.classList.remove('active');
                chatScreen.classList.add('active');
                peerNameDisplay.textContent = 'Aguardando parceiro...';
                statusDot.className = 'status-dot connecting';
                statusText.textContent = 'Aguardando...';
                
                messageArea.innerHTML = '';
                appendMessage(null, `Bem-vindo, <b>${myUsername}</b>! Compartilhe o ID acima para iniciar.`, 'notification');
            });
        });

        // Action: Join Room
        joinRoomBtn.addEventListener('click', () => {
            const name = usernameInput.value.trim();
            const joinId = roomIdInput.value.trim();

            if (!name) {
                alert('Por favor, digite seu nome/apelido primeiro.');
                usernameInput.focus();
                return;
            }
            if (!joinId) {
                alert('Por favor, digite o ID da sala onde deseja entrar.');
                roomIdInput.focus();
                return;
            }

            myUsername = name;
            isHost = false;
            hostRoomId = joinId;

            initPeer((myId) => {
                setLoader(true, 'Conectando ao parceiro...');
                
                const conn = peerInstance.connect(joinId, {
                    metadata: { username: myUsername }
                });

                handleConnection(conn);
                peerNameDisplay.textContent = 'Parceiro';
                messageArea.innerHTML = '';
                
                // Timeout logic if connect fails to respond
                setTimeout(() => {
                    if (activeConn && activeConn.open) {
                        setLoader(false);
                    } else {
                        setLoader(false);
                        if (!activeConn || !activeConn.open) {
                            showAlert('O sinal falhou ou o parceiro está demorando para responder.', false);
                        }
                    }
                }, 10000);
            });
        });

        // Send Message action
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            if (!activeConn || !activeConn.open) {
                alert('Sem conexão ativa no momento.');
                return;
            }

            // Send message over WebRTC channel
            activeConn.send({
                type: 'message',
                text: text
            });

            // Append locally
            appendMessage(myUsername, text, 'sent');
            messageInput.value = '';
            messageInput.focus();
        }

        sendMessageBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Action: Leave Chat
        function leaveChat() {
            destroyPeer();
            hideAlert();
            chatScreen.classList.remove('active');
            setupScreen.classList.add('active');
        }

        leaveChatBtn.addEventListener('click', leaveChat);

        // Action: Reconnect Action from alert banner
        reconnectBtn.addEventListener('click', () => {
            if (peerInstance && peerInstance.disconnected) {
                setLoader(true, 'Reconectando ao servidor...');
                peerInstance.reconnect();
            } else {
                // Fresh restart
                if (isHost) {
                    createRoomBtn.click();
                } else {
                    joinRoomBtn.click();
                }
            }
        });
    </script>
</body>
</html>
